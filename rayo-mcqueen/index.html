<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>¡Ka-Chow! Hola Mundo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #3a0000;
    font-family: "Impact", "Arial Black", sans-serif;
    color: #fff;
  }

  /* Fondo con gradiente rojo Rayo McQueen */
  body {
    background:
      radial-gradient(ellipse at 50% 40%, #ff1a1a 0%, #c00000 35%, #6b0000 70%, #2a0000 100%);
    position: relative;
  }

  /* Canvas para la red de "webs" */
  canvas#webs {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    display: block;
  }

  /* Rayas de carrera diagonales */
  .stripes {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: repeating-linear-gradient(
      -20deg,
      transparent 0 80px,
      rgba(255, 255, 255, 0.03) 80px 86px,
      transparent 86px 160px,
      rgba(255, 220, 0, 0.04) 160px 166px
    );
    pointer-events: none;
  }

  /* Contenedor principal */
  .scene {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    text-align: center;
    padding: 2rem;
  }

  /* Número 95 estilo Rayo McQueen */
  .number-95 {
    font-size: clamp(5rem, 18vw, 14rem);
    line-height: 0.9;
    font-weight: 900;
    color: #ffd500;
    -webkit-text-stroke: 6px #000;
    text-stroke: 6px #000;
    letter-spacing: -0.05em;
    transform: skewX(-10deg);
    text-shadow:
      0 0 20px rgba(255, 213, 0, 0.6),
      0 0 40px rgba(255, 100, 0, 0.4),
      6px 6px 0 #000;
    animation: bounce 2.4s ease-in-out infinite;
  }

  /* Rayo SVG */
  .bolt-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 25px rgba(255, 230, 0, 0.8));
  }

  .bolt {
    width: clamp(80px, 14vw, 180px);
    height: auto;
    animation: flash 1.6s ease-in-out infinite;
  }

  /* Texto "HOLA MUNDO" */
  .hola {
    font-size: clamp(2.5rem, 9vw, 7rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #fff;
    -webkit-text-stroke: 3px #000;
    text-shadow:
      4px 4px 0 #000,
      0 0 25px rgba(255, 255, 255, 0.35),
      0 0 60px rgba(255, 40, 0, 0.8);
    transform: skewX(-8deg);
  }

  .hola span.red {
    color: #ffd500;
  }

  /* Ka-Chow */
  .kachow {
    font-size: clamp(1.2rem, 3vw, 2.2rem);
    color: #ffd500;
    -webkit-text-stroke: 1.5px #000;
    letter-spacing: 0.25em;
    transform: skewX(-8deg);
    text-shadow: 3px 3px 0 #000;
    animation: pulse 1.8s ease-in-out infinite;
  }

  /* Velocímetro inferior: líneas de velocidad */
  .speed-lines {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .speed-lines::before,
  .speed-lines::after {
    content: "";
    position: absolute;
    width: 200vmax;
    height: 4px;
    background: linear-gradient(90deg, transparent, #ffd500, transparent);
    opacity: 0.55;
    animation: slide 2.2s linear infinite;
  }

  .speed-lines::before { top: 18%; animation-delay: 0s; }
  .speed-lines::after  { bottom: 22%; animation-delay: 1.1s; }

  /* Viñeta oscura */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
  }

  @keyframes bounce {
    0%, 100% { transform: skewX(-10deg) translateY(0); }
    50%      { transform: skewX(-10deg) translateY(-10px); }
  }

  @keyframes flash {
    0%, 100% { opacity: 1;   filter: drop-shadow(0 0 18px rgba(255,230,0,0.9)); }
    50%      { opacity: 0.7; filter: drop-shadow(0 0 40px rgba(255,255,255,1)); }
  }

  @keyframes pulse {
    0%, 100% { transform: skewX(-8deg) scale(1);    opacity: 1; }
    50%      { transform: skewX(-8deg) scale(1.08); opacity: 0.85; }
  }

  @keyframes slide {
    0%   { transform: translateX(-100%) rotate(-4deg); }
    100% { transform: translateX(100%)  rotate(-4deg); }
  }
</style>
</head>
<body>

<canvas id="webs"></canvas>
<div class="stripes"></div>
<div class="speed-lines"></div>

<main class="scene">
  <div class="number-95">95</div>

  <div class="bolt-wrap">
    <svg class="bolt" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon
        points="70,0 10,100 55,100 35,180 110,70 65,70 90,0"
        fill="#ffd500"
        stroke="#000"
        stroke-width="6"
        stroke-linejoin="round" />
    </svg>
  </div>

  <h1 class="hola">HOLA <span class="red">MUNDO</span></h1>
  <p class="kachow">K A · C H O W</p>
</main>

<div class="vignette"></div>

<script>
  // Red dinámica de "webs": nodos conectados por líneas
  const canvas = document.getElementById("webs");
  const ctx = canvas.getContext("2d");

  let w, h, nodes;
  const NODE_COUNT = 90;
  const MAX_DIST = 150;

  function resize() {
    w = canvas.width  = window.innerWidth  * devicePixelRatio;
    h = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width  = window.innerWidth  + "px";
    canvas.style.height = window.innerHeight + "px";
  }

  function makeNodes() {
    nodes = Array.from({ length: NODE_COUNT }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.6 * devicePixelRatio,
      vy: (Math.random() - 0.5) * 0.6 * devicePixelRatio,
    }));
  }

  function step() {
    ctx.clearRect(0, 0, w, h);

    // mover
    for (const n of nodes) {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > w) n.vx *= -1;
      if (n.y < 0 || n.y > h) n.vy *= -1;
    }

    // líneas
    const maxD = MAX_DIST * devicePixelRatio;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist < maxD) {
          const alpha = 1 - dist / maxD;
          ctx.strokeStyle = `rgba(255, ${Math.floor(60 + alpha * 120)}, ${Math.floor(40 * alpha)}, ${alpha * 0.6})`;
          ctx.lineWidth = 1 * devicePixelRatio;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    // nodos
    for (const n of nodes) {
      ctx.fillStyle = "rgba(255, 220, 0, 0.85)";
      ctx.beginPath();
      ctx.arc(n.x, n.y, 1.8 * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(step);
  }

  window.addEventListener("resize", () => { resize(); makeNodes(); });
  resize();
  makeNodes();
  step();
</script>
</body>
</html>

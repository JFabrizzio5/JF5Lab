services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rentafacil_db
      POSTGRES_USER: rentafacil
      POSTGRES_PASSWORD: rentafacil123
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentafacil -d rentafacil_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+asyncpg://rentafacil:rentafacil123@db:5432/rentafacil_db
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["./entrypoint.sh"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3002:3002"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pg_data:

limit_req_zone $binary_remote_addr zone=hclaude_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=hclaude_all:10m rate=120r/m;

server {
  listen 80;
  server_name _;

  # Rate limit global
  limit_req zone=hclaude_all burst=40 nodelay;

  # Face auth endpoints — stricter
  location ~ ^/api/holaclaude/v1/(enroll|verify|disable|reset) {
    limit_req zone=hclaude_auth burst=5 nodelay;
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # API general
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 600s;
  }

  # Front (Vite dev)
  location / {
    proxy_pass http://front:3065;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Headers seguridad adicionales
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
}

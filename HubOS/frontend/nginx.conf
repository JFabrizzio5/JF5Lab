server {
    listen 3035;
    root /usr/share/nginx/html;
    index index.html;

    # WhatsApp media uploads can reach 16 MB (images/video) or 64 MB
    # (documents). Add slack on top of the browser-side 16 MB cap.
    client_max_body_size 64m;

    # index.html — never cache, so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # hashed assets — safe to cache long
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Docker's embedded DNS lives at 127.0.0.11. Routing proxy_pass through a
    # variable forces nginx to re-resolve at request time instead of caching the
    # backend's IP at startup — so a `docker compose restart hubos_backend` no
    # longer leaves nginx pointing at a dead IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend_upstream "hubos_backend:8075";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}

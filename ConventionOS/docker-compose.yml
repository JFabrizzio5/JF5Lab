version: '3.8'
services:
  convention_postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: convention_db
      POSTGRES_USER: conv_user
      POSTGRES_PASSWORD: conv_pass
    volumes:
      - convention_pg_data:/var/lib/postgresql/data
    networks: [convention_net]

  convention_backend:
    build: ./backend
    ports: ["8060:8060"]
    environment:
      DB_HOST: convention_postgres
      DB_PORT: "5432"
      DB_NAME: convention_db
      DB_USER: conv_user
      DB_PASS: conv_pass
      STRIPE_SECRET_KEY: ""
      STRIPE_CLIENT_ID: ""
      PLATFORM_DOMAIN: "http://localhost:3025"
    depends_on: [convention_postgres]
    networks: [convention_net]

  convention_frontend:
    build: ./frontend
    ports: ["3025:3025"]
    depends_on: [convention_backend]
    networks: [convention_net]

networks:
  convention_net:

volumes:
  convention_pg_data:

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API a backend (compose service `api:8000`)
    location /cobrar/ { proxy_pass http://api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /health { proxy_pass http://api:8000; }
    location /docs   { proxy_pass http://api:8000; }
    location /openapi.json { proxy_pass http://api:8000; }

    # SPA fallback
    location / { try_files $uri $uri/ /index.html; }
}
